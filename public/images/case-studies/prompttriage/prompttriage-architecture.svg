<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">PromptTriage architecture diagram</title>
  <desc id="desc">Current PromptTriage architecture showing browser UI, Next.js API layer, Supabase Auth, Stripe billing, FastAPI RAG, Pinecone, model providers, research jobs, and cloud deployment history.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.45" stop-color="#151519"/>
      <stop offset="1" stop-color="#303137"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.32" stop-color="#d9dce3"/>
      <stop offset="0.68" stop-color="#a7acb6"/>
      <stop offset="1" stop-color="#f7f7f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d4d7dd"/>
    </marker>
    <style>
      .titleText { font: 700 28px Inter, Arial, sans-serif; fill: #ffffff; }
      .label { font: 700 25px Inter, Arial, sans-serif; fill: #ffffff; }
      .small { font: 500 18px Inter, Arial, sans-serif; fill: #d8dbe1; }
      .smallDark { font: 600 18px Inter, Arial, sans-serif; fill: #202226; }
      .tinyDark { font: 800 17px Inter, Arial, sans-serif; fill: #111317; }
      .box { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.24); stroke-width: 2; }
      .boxLight { fill: url(#chrome); stroke: rgba(255,255,255,0.74); stroke-width: 2; }
      .line { stroke: #d4d7dd; stroke-width: 4; fill: none; marker-end: url(#arrow); opacity: 0.92; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="280" cy="120" r="220" fill="#ffffff" opacity="0.05"/>
  <circle cx="1320" cy="820" r="300" fill="#ffffff" opacity="0.04"/>
  <rect x="84" y="72" width="1432" height="820" rx="46" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.24)" stroke-width="2" filter="url(#shadow)"/>

  <text x="126" y="138" class="small" letter-spacing="5">PROMPTTRIAGE CURRENT ARCHITECTURE</text>
  <text x="126" y="190" class="titleText">RAG prompt system, research pipeline, and cloud delivery path</text>

  <rect x="122" y="260" width="258" height="142" rx="24" class="boxLight"/>
  <text x="154" y="314" class="tinyDark">Browser UI</text>
  <text x="154" y="348" class="smallDark">Intent, modality,</text>
  <text x="154" y="378" class="smallDark">answers, output</text>

  <rect x="462" y="226" width="316" height="210" rx="28" class="box"/>
  <text x="500" y="284" class="label">Next.js app</text>
  <text x="500" y="324" class="small">Analyze and refine</text>
  <text x="500" y="354" class="small">Supabase Auth</text>
  <text x="500" y="384" class="small">Stripe checks</text>

  <rect x="860" y="226" width="316" height="210" rx="28" class="box"/>
  <text x="898" y="284" class="label">FastAPI RAG</text>
  <text x="898" y="324" class="small">Health route</text>
  <text x="898" y="354" class="small">Retrieval orchestration</text>
  <text x="898" y="384" class="small">Pinecone context</text>

  <rect x="1240" y="260" width="258" height="142" rx="24" class="boxLight"/>
  <text x="1272" y="314" class="tinyDark">Pinecone</text>
  <text x="1272" y="348" class="smallDark">28K+ prompt</text>
  <text x="1272" y="378" class="smallDark">vectors</text>

  <rect x="462" y="548" width="316" height="210" rx="28" class="box"/>
  <text x="500" y="606" class="label">Generation</text>
  <text x="500" y="646" class="small">Metaprompts</text>
  <text x="500" y="676" class="small">Model provider calls</text>
  <text x="500" y="706" class="small">Prompt output</text>

  <rect x="860" y="548" width="316" height="210" rx="28" class="box"/>
  <text x="898" y="606" class="label">Research layer</text>
  <text x="898" y="646" class="small">Unsloth and QLoRA</text>
  <text x="898" y="676" class="small">Azure ML A100 jobs</text>
  <text x="898" y="706" class="small">Judge outputs</text>

  <rect x="1240" y="548" width="258" height="210" rx="28" class="box"/>
  <text x="1272" y="606" class="label">Delivery</text>
  <text x="1272" y="646" class="small">GitHub Actions</text>
  <text x="1272" y="676" class="small">Azure Registry</text>
  <text x="1272" y="706" class="small">Azure Apps</text>
  <text x="1272" y="736" class="small">Cloud Run history</text>

  <path d="M380 331 H462" class="line"/>
  <path d="M778 331 H860" class="line"/>
  <path d="M1176 331 H1240" class="line"/>
  <path d="M620 436 V548" class="line"/>
  <path d="M778 653 H860" class="line"/>
  <path d="M1176 653 H1240" class="line"/>
  <path d="M1018 548 C1018 492 1018 492 1018 436" class="line"/>

  <text x="126" y="840" class="small">Evidence: source code, Azure ML job metadata, release charts, Hashnode articles, and cost screenshot.</text>
</svg>
