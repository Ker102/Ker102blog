name: Sync Hashnode Posts (Hourly)

on:
  schedule:
    - cron: '0 * * * *' # Runs at the top of every hour
  workflow_dispatch: # Allows manual triggering from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Hashnode posts
        env:
          HASHNODE_PUBLICATION_HOST: ${{ vars.HASHNODE_PUBLICATION_HOST || 'blog.kaelux.dev' }}
        run: node scripts/fetch-hashnode.js

      - name: Check for new posts
        id: check
        run: |
          if [[ -n $(git status --porcelain src/content/blog/hn-*) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push new posts
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/hn-*.mdx
          git commit -m "feat: sync new posts from Hashnode"
          git push
